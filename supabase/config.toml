# Minimal Supabase CLI config for the ezstemz-web project. Generate the full
# version with `supabase init` if/when you need branching, edge functions,
# vector storage, etc.
project_id = "ezstemz-web"

[db]
major_version = 15

[auth]
enable_signup = true
site_url = "http://localhost:3000"
# Wildcard covers /auth/confirm and any future query params. Hosted projects
# need the same entry under Dashboard → Authentication → URL Configuration.
additional_redirect_urls = ["http://localhost:3000/**"]
# We rely on email + password auth out of the box. Email confirmations are
# important — the signup flow expects the /auth/confirm handler to be the
# Site URL → Redirect URLs allowlist target.
[auth.email]
enable_confirmations = true
# Local `supabase start` captures outbound auth mail in Inbucket:
# http://127.0.0.1:54324
